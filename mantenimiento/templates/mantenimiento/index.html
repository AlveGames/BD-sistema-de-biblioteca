{% extends 'base.html' %}
{% block title %}Gestión de datos base — Biblioteca Universitaria{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-gear"></i> Gestión de datos base</h2>
<p class="text-muted">Mantenimiento de las tablas maestras del sistema.</p>

<div class="card" style="max-width: 400px;">
  <div class="card-body p-0">
    <div class="list-group list-group-flush">
      <a href="{% url 'mantenimiento:usuario_lista' %}" class="list-group-item list-group-item-action">
        <i class="bi bi-people"></i> Usuarios
      </a>
      <a href="{% url 'mantenimiento:libro_lista' %}" class="list-group-item list-group-item-action">
        <i class="bi bi-book"></i> Libros
      </a>
      <a href="{% url 'mantenimiento:autor_lista' %}" class="list-group-item list-group-item-action">
        <i class="bi bi-person-badge"></i> Autores
      </a>
      <a href="{% url 'mantenimiento:bibliotecario_lista' %}" class="list-group-item list-group-item-action">
        <i class="bi bi-person-workspace"></i> Bibliotecarios
      </a>
      <a href="{% url 'mantenimiento:ejemplar_lista' %}" class="list-group-item list-group-item-action">
        <i class="bi bi-collection"></i> Ejemplares
      </a>
    </div>
  </div>
</div>
{% endblock %}

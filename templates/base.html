{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Biblioteca Universitaria{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/theme.css' %}" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-book-fill"></i> Biblioteca UNEMI</div>

  <nav class="sidebar-nav">
    <a href="{% url 'inicio' %}" class="sidebar-link"><i class="bi bi-house-door"></i> Inicio</a>
    <a href="{% url 'prestamos:lista' %}" class="sidebar-link"><i class="bi bi-journal-bookmark"></i> Préstamos</a>
    <a href="{% url 'reservas:lista' %}" class="sidebar-link"><i class="bi bi-calendar-check"></i> Reservas</a>
    <a href="{% url 'multas:lista' %}" class="sidebar-link"><i class="bi bi-cash-coin"></i> Multas</a>
    <a href="{% url 'reportes:index' %}" class="sidebar-link"><i class="bi bi-bar-chart"></i> Reportes</a>
  </nav>

  <div class="sidebar-footer">
    <a href="{% url 'mantenimiento:index' %}" class="sidebar-footer-link">
      <i class="bi bi-gear"></i> Gestión de datos base
    </a>
  </div>
</aside>

<main class="content">
  {% if messages %}
    {% for message in messages %}
      <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %}" role="alert">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
